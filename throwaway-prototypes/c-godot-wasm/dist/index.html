		<title>Context Battler Telefrag Register</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #010203;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

<!-- telefrag-custom-loader -->
		<style>
#status {
	background:
		linear-gradient(rgba(0, 0, 0, 0.56), rgba(0, 0, 0, 0.78)),
		repeating-linear-gradient(0deg, rgba(0, 230, 255, 0.08) 0 1px, transparent 1px 34px),
		repeating-linear-gradient(90deg, rgba(255, 40, 70, 0.06) 0 1px, transparent 1px 42px),
		#03070b;
	color: #f4fbff;
	display: grid;
	font-family: "Inter", "Segoe UI", Arial, sans-serif;
	inset: 0;
	overflow: hidden;
	place-items: center;
	visibility: hidden;
	z-index: 10;
}

#status::before,
#status::after {
	content: "";
	inset: 0;
	pointer-events: none;
	position: absolute;
}

#status::before {
	background: repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.045) 0 1px, transparent 1px 4px);
	mix-blend-mode: screen;
	opacity: 0.22;
}

#status::after {
	animation: telefrag-scan 2.7s linear infinite;
	background: linear-gradient(180deg, transparent 0%, rgba(0, 230, 255, 0.26) 48%, transparent 58%);
	transform: translateY(-100%);
}

.telefrag-loader {
	box-sizing: border-box;
	max-width: 620px;
	padding: 24px;
	position: relative;
	width: calc(100% - 32px);
	z-index: 1;
}

.telefrag-register {
	background: rgba(2, 7, 12, 0.86);
	border: 1px solid rgba(0, 230, 255, 0.48);
	border-radius: 6px;
	box-shadow: 0 0 0 1px rgba(255, 40, 70, 0.16), 0 24px 80px rgba(0, 0, 0, 0.62);
	padding: 22px;
	position: relative;
}

.telefrag-register::before {
	border: 1px solid rgba(255, 40, 70, 0.38);
	content: "";
	inset: 8px;
	pointer-events: none;
	position: absolute;
}

.telefrag-kicker,
.telefrag-row span,
.telefrag-row i {
	color: #89f7ff;
	font-size: 0.72rem;
	font-style: normal;
	font-weight: 700;
	letter-spacing: 0;
	text-transform: uppercase;
}

.telefrag-title {
	color: #ffffff;
	font-size: 1.85rem;
	font-weight: 800;
	letter-spacing: 0;
	line-height: 1.05;
	margin-top: 10px;
	text-transform: uppercase;
}

.telefrag-subtitle {
	color: #ffda78;
	font-size: 0.9rem;
	line-height: 1.45;
	margin-top: 8px;
}

.telefrag-grid {
	border-top: 1px solid rgba(137, 247, 255, 0.26);
	display: grid;
	gap: 8px;
	margin-top: 20px;
	padding-top: 16px;
}

.telefrag-row {
	align-items: center;
	display: grid;
	gap: 10px;
	grid-template-columns: 74px minmax(0, 1fr) 72px;
	min-height: 28px;
}

.telefrag-row b {
	color: #f5fbff;
	font-size: 0.86rem;
	font-weight: 700;
	letter-spacing: 0;
	overflow-wrap: anywhere;
	text-transform: uppercase;
}

.telefrag-row i {
	color: #ff4f68;
	text-align: right;
}

#status-progress {
	appearance: none;
	background: rgba(137, 247, 255, 0.1);
	border: 1px solid rgba(137, 247, 255, 0.42);
	border-radius: 0;
	bottom: auto;
	box-sizing: border-box;
	display: none;
	height: 12px;
	margin: 20px 0 0;
	position: static;
	width: 100%;
}

#status-progress::-webkit-progress-bar {
	background: rgba(137, 247, 255, 0.1);
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #00e6ff, #ff2d4d);
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #00e6ff, #ff2d4d);
}

#status-notice {
	background: rgba(45, 8, 16, 0.9);
	border: 1px solid rgba(255, 79, 104, 0.72);
	border-radius: 6px;
	color: #f8eef1;
	display: none;
	font-family: "Inter", "Segoe UI", Arial, sans-serif;
	font-size: 0.92rem;
	line-height: 1.4;
	margin: 16px 0 0;
	overflow-wrap: anywhere;
	padding: 12px;
	position: static;
	text-align: left;
}

#status-splash,
#-gd-engine-icon {
	display: none !important;
}

@keyframes telefrag-scan {
	from {
		transform: translateY(-100%);
	}

	to {
		transform: translateY(100%);
	}
}

@media (max-width: 520px) {
	.telefrag-loader {
		padding: 12px;
		width: calc(100% - 18px);
	}

	.telefrag-register {
		padding: 18px;
	}

	.telefrag-title {
		font-size: 1.45rem;
	}

	.telefrag-row {
		grid-template-columns: 58px minmax(0, 1fr) 58px;
	}
}

						<div class="telefrag-row"><span>impact</span><b>Red mist pass</b><i>locked</i></div>

		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":781848,"index.wasm":37695054},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThis prototype requires browser features that are unavailable:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
